<h1 class="auth-title">Reset password</h1>
<p class="auth-subtitle">Choose a new password for your account.</p>

<form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
  <mat-form-field appearance="outline" class="u-full-width">
    <mat-label>New password</mat-label>
    <input
      matInput
      [type]="hidePassword() ? 'password' : 'text'"
      formControlName="newPassword"
      autocomplete="new-password"
      required
    />
    <mat-icon matPrefix>lock_outline</mat-icon>
    <button
      mat-icon-button
      matSuffix
      type="button"
      [attr.aria-label]="hidePassword() ? 'Show password' : 'Hide password'"
      (click)="hidePassword.set(!hidePassword())"
    >
      <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
  </mat-form-field>
  <app-form-error [control]="form.controls.newPassword" label="Password" />

  <mat-form-field appearance="outline" class="u-full-width">
    <mat-label>Confirm new password</mat-label>
    <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="confirmPassword" required />
    <mat-icon matPrefix>lock_outline</mat-icon>
  </mat-form-field>
  <app-form-error [control]="form.controls.confirmPassword" label="Confirmation" />

  <button
    mat-flat-button
    color="primary"
    type="submit"
    class="u-full-width auth-form__submit"
    [disabled]="submitting()"
    style="margin-top: 0.5rem"
  >
    @if (submitting()) {
      <mat-progress-spinner mode="indeterminate" diameter="20" />
    } @else {
      Reset password
    }
  </button>
</form>

<p class="auth-form__footer">
  <a routerLink="/auth/login">Back to sign in</a>
</p>
