@if (submitted()) {
  <h1 class="auth-title">Check your email</h1>
  <p class="auth-subtitle">
    If an account exists for that address, we've sent a link to reset your password.
  </p>
} @else {
  <h1 class="auth-title">Forgot password</h1>
  <p class="auth-subtitle">Enter your account email and we'll send you a reset link.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
    <mat-form-field appearance="outline" class="u-full-width">
      <mat-label>Email address</mat-label>
      <input matInput type="email" formControlName="email" autocomplete="email" required />
      <mat-icon matPrefix>mail_outline</mat-icon>
    </mat-form-field>
    <app-form-error [control]="form.controls.email" label="Email" />

    <button
      mat-flat-button
      color="primary"
      type="submit"
      class="u-full-width auth-form__submit"
      [disabled]="submitting()"
      style="margin-top: 1rem"
    >
      @if (submitting()) {
        <mat-progress-spinner mode="indeterminate" diameter="20" />
      } @else {
        Send reset link
      }
    </button>
  </form>
}

<p class="auth-form__footer">
  <a routerLink="/auth/login">Back to sign in</a>
</p>
