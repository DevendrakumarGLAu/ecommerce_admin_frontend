<h1 class="auth-title">Create admin account</h1>
<p class="auth-subtitle">Sign up to get started managing Firozabad Bangles.</p>

<form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
  <div class="auth-form__grid">
    <mat-form-field appearance="outline" class="u-full-width">
      <mat-label>First name</mat-label>
      <input matInput formControlName="firstName" autocomplete="given-name" required />
    </mat-form-field>

    <mat-form-field appearance="outline" class="u-full-width">
      <mat-label>Last name</mat-label>
      <input matInput formControlName="lastName" autocomplete="family-name" required />
    </mat-form-field>
  </div>
  <div class="auth-form__grid">
    <app-form-error [control]="form.controls.firstName" label="First name" />
    <app-form-error [control]="form.controls.lastName" label="Last name" />
  </div>

  <mat-form-field appearance="outline" class="u-full-width">
    <mat-label>Email address</mat-label>
    <input matInput type="email" formControlName="email" autocomplete="email" required />
    <mat-icon matPrefix>mail_outline</mat-icon>
  </mat-form-field>
  <app-form-error [control]="form.controls.email" label="Email" />

  <mat-form-field appearance="outline" class="u-full-width">
    <mat-label>Phone (optional)</mat-label>
    <input matInput formControlName="phone" autocomplete="tel" />
    <mat-icon matPrefix>call</mat-icon>
  </mat-form-field>
  <app-form-error [control]="form.controls.phone" label="Phone" />

  <mat-form-field appearance="outline" class="u-full-width">
    <mat-label>Password</mat-label>
    <input
      matInput
      [type]="hidePassword() ? 'password' : 'text'"
      formControlName="password"
      autocomplete="new-password"
      required
    />
    <mat-icon matPrefix>lock_outline</mat-icon>
    <button
      mat-icon-button
      matSuffix
      type="button"
      [attr.aria-label]="hidePassword() ? 'Show password' : 'Hide password'"
      (click)="hidePassword.set(!hidePassword())"
    >
      <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
  </mat-form-field>
  <app-form-error [control]="form.controls.password" label="Password" />

  <mat-form-field appearance="outline" class="u-full-width">
    <mat-label>Confirm password</mat-label>
    <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="confirmPassword" required />
    <mat-icon matPrefix>lock_outline</mat-icon>
  </mat-form-field>
  <app-form-error [control]="form.controls.confirmPassword" label="Confirmation" />

  <button
    mat-flat-button
    color="primary"
    type="submit"
    class="u-full-width auth-form__submit"
    [disabled]="submitting()"
    style="margin-top: 0.5rem"
  >
    @if (submitting()) {
      <mat-progress-spinner mode="indeterminate" diameter="20" />
    } @else {
      Create account
    }
  </button>
</form>

<p class="auth-form__footer">
  Already have an account? <a routerLink="/auth/login">Sign in</a>
</p>
