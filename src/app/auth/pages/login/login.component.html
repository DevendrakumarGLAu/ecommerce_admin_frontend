<h1 class="auth-title">Sign in</h1>
<p class="auth-subtitle">Welcome back — enter your credentials to access the admin panel.</p>

<form [formGroup]="form" (ngSubmit)="submit()" class="auth-form" novalidate>
  <mat-form-field appearance="outline" class="u-full-width">
    <mat-label>Email address</mat-label>
    <input matInput type="email" formControlName="email" autocomplete="email" required />
    <mat-icon matPrefix>mail_outline</mat-icon>
  </mat-form-field>
  <app-form-error [control]="form.controls.email" label="Email" />

  <mat-form-field appearance="outline" class="u-full-width">
    <mat-label>Password</mat-label>
    <input
      matInput
      [type]="hidePassword() ? 'password' : 'text'"
      formControlName="password"
      autocomplete="current-password"
      required
    />
    <mat-icon matPrefix>lock_outline</mat-icon>
    <button
      mat-icon-button
      matSuffix
      type="button"
      [attr.aria-label]="hidePassword() ? 'Show password' : 'Hide password'"
      (click)="hidePassword.set(!hidePassword())"
    >
      <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
    </button>
  </mat-form-field>
  <app-form-error [control]="form.controls.password" label="Password" />

  <div class="auth-form__row">
    <a routerLink="/auth/forgot-password">Forgot password?</a>
  </div>

  <button mat-flat-button color="primary" type="submit" class="u-full-width auth-form__submit" [disabled]="submitting()">
    @if (submitting()) {
      <mat-progress-spinner mode="indeterminate" diameter="20" />
    } @else {
      Sign in
    }
  </button>
</form>
